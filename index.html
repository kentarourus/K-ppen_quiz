<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Köppen Climate Quiz | ケッペンの気候区分クイズ</title>
    
    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
                    .catch((err) => console.error('Service Worker registration failed:', err));
            });
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=7">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container glass-panel" style="position: relative;">
        <div class="settings-trigger">
            <button id="settings-toggle-btn" class="icon-btn" title="設定" onclick="toggleSettingsDropdown()">
                <span class="material-symbols-rounded">settings</span>
            </button>
            <div id="settings-dropdown" class="settings-dropdown hidden">
                <div class="dropdown-item">
                    <label>範囲選択</label>
                    <select id="scope-select" onchange="setScope(this.value)">
                        <option value="highschool">高校範囲</option>
                        <option value="specialized">専門範囲</option>
                    </select>
                </div>
                <div class="dropdown-item" style="margin-top: 10px;">
                    <label>テーマ設定</label>
                    <select id="theme-select">
                        <option value="auto">自動 (システム同期)</option>
                        <option value="light">ライトモード</option>
                        <option value="dark">ダークモード</option>
                    </select>
                </div>
            </div>
        </div>
        <header>
            <h1>Climate Challenge</h1>
            <p>雨温図からケッペンの気候区分を当てよう！</p>
        </header>

        <div id="quiz-container">
            <div class="settings-panel">
                <span class="settings-label">回答方式:</span>
                <div class="mode-selector">
                    <button id="mode-choice" class="mode-btn active" onclick="setAnswerMode('choice')">選択式 (4択)</button>
                    <button id="mode-input" class="mode-btn" onclick="setAnswerMode('input')">入力式 (記述)</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <canvas id="climograph"></canvas>
            </div>
            
            <div id="hint-section" class="hidden">
                <p><strong>Hint:</strong> <span id="location-hint"></span></p>
            </div>

            <div class="controls">
                <button id="btn-hint" class="btn btn-secondary">ヒントを見る</button>
                <button id="btn-next" class="btn btn-primary hidden">次の問題へ</button>
            </div>

            <div class="question-section">
                <h3>この地点の気候区分は？</h3>
                <div id="options-grid" class="options-grid">
                    <!-- Options will be dynamically populated here -->
                </div>
                
                <div id="input-section" class="input-section hidden">
                    <input type="text" id="answer-input" placeholder="例: Cfa, BSk, ET..." autocomplete="off" />
                    <button id="btn-submit-answer" class="btn btn-primary">回答する</button>
                </div>
            </div>

            <div id="result-message" class="result-message hidden">
                <!-- Result feedback -->
            </div>

            <div id="explanation-container" class="explanation-container hidden">
                <h3>気候区分の判定解説</h3>
                <div id="explanation-content"></div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>データを読み込み中...</p>
        </div>

        <footer class="quiz-footer">
            <p>データ出典：気象庁「世界の天候データツール（ClimatView）」平年値データをもとに作成・判定</p>
        </footer>
    </main>

    <script src="script.js?v=4"></script>
</body>
</html>
